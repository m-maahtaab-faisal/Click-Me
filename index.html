<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Click Me Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="center" id="home">
    <h1 style="letter-spacing: 4px; color: var(--premium-gold); margin-top: 0;">CLICK ME</h1>
    <div id="scores" style="margin-bottom: 20px; opacity: 0.9; height: 180px; overflow-y: hidden;">
        Loading Leaderboard...
    </div>
    <input id="username" placeholder="ENTER YOUR NAME" autocomplete="off">
    <br>
    <button class="start-btn" onclick="start()">START GAME</button>

    <div style="display: flex; justify-content: center; margin-top: 15px; max-width: 100%; overflow: hidden;">
        </div>

    <div style="margin-top: 15px; font-size: 0.7rem; opacity: 0.6;">
        <a href="privacy.html" style="color: #00f2ff; text-decoration: none;">Privacy & Legal</a>
    </div>
</div>

<div id="game" style="display:none; width: 100%;">
    <div id="timer">30s</div>
    <div id="message" style="position: absolute; top: 20px; left: 40px; font-size: 1.5rem; color: rgba(255,255,255,0.8); font-weight: bold;">LEVEL 1</div>
    <div id="taunt" style="position: absolute; top: 60px; left: 40px; font-size: 1.2rem; color: #ff4757; font-style: italic;"></div>
    <div id="gameArea"><button id="gameBtn">CLICK ME</button></div>
</div>

<div id="popup">
    <div class="popupBox">
        <h2 id="result" style="margin-bottom: 25px; line-height: 1.4;"></h2>

        <div style="display: flex; justify-content: center; margin-bottom: 15px; max-width: 100%; overflow: hidden;">
            </div>

        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="action-btn" onclick="retry()">RETRY</button>
            <button class="action-btn" onclick="openShareMenu()" style="background:#00f2ff; color:#000; border:none; font-weight:800;">SHARE</button>
        </div>
        <button class="action-btn" onclick="goHome()" style="margin-top: 15px; width:100%; border-color:gray; color:gray;">LEADERBOARD</button>
    </div>
</div>

<div id="shareModal">
    <div class="popupBox" style="width: 280px;">
        <h3 style="margin-top:0; color:#00f2ff;">TRANSMIT SCORE</h3>
        <div class="share-grid">
            <button class="share-btn wa" onclick="shareTo('whatsapp')">WhatsApp</button>
            <button class="share-btn tg" onclick="shareTo('telegram')">Telegram</button>
            <button class="share-btn x" onclick="shareTo('x')">X / Twitter</button>
            <button class="share-btn cp" onclick="shareTo('copy')">Copy Link</button>
        </div>
        <button class="action-btn" onclick="closeShareMenu()" style="margin-top:15px; width:100%; border-color:gray; color:gray;">CANCEL</button>
    </div>
</div>

<div id="loadingScreen">
    <div class="spinner"></div>
    <div style="margin-top:20px; color:#00f2ff; letter-spacing:4px; font-weight:bold;">INITIALIZING SYSTEM...</div>
</div>

<script type="module" src="game.js"></script>

</body>
</html>
