<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Impossible Button</title>

<style>
body{
  margin:0;
  height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:sans-serif;
  color:white;
}

.screen{display:none;text-align:center;}
.active{display:block;}

button{
  padding:15px 50px;
  font-size:20px;
  border:none;
  border-radius:40px;
  background:#ff2e2e;
  color:white;
  cursor:pointer;
}

#gameBtn{
  position:absolute;
  font-size:24px;
}

#timer{
  position:absolute;
  top:20px;
  right:20px;
}

#leaderboard{
  position:absolute;
  left:20px;
  top:20px;
  font-size:14px;
}

/* popup */
#popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div id="login" class="screen active">
  <h2>Enter Name</h2>
  <input id="username"><br><br>
  <button onclick="start()">Start</button>
</div>

<div id="game" class="screen">
  <div id="timer">30s</div>
  <div id="leaderboard">🏆 Global<br><div id="scores"></div></div>
  <div id="message">Ready?</div>
  <button id="gameBtn">CLICK ME</button>
</div>

<div id="popup">
  <div>
    <h2 id="result"></h2><br>
    <button onclick="location.reload()">Retry</button>
    <button onclick="shareResult()">Share</button>
  </div>
</div>

<script type="module" src="game.js"></script>
</body>
</html>
